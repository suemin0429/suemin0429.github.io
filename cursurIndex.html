<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>유수민의 포트폴리오</title>
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <div class="container">
        <h3>여기는 포트폴리오 사이트입니다.</h3>
        <p>
            저는 명지대학교 컴퓨터공학과 24학번 유수민입니다. 현재 5전공 듣고 있습니다. <br>
            힘들지만 보람찬 일이라고 할 수 있습니다.
        </p>
    </div>

    <h2>해야할 일</h2>
    <ul id="todoList" aria-label="해야할 일 목록">
        <li>대표 논문 읽어보기</li>
        <li>발표 자료 인쇄하기</li>
    </ul>
    <ol id="planList" aria-label="계획 목록">
        <li>명지대에서 포폴 만들기</li>
        <li>수업 듣기</li>
    </ol>

    <a href="https://www.naver.com/">연결 사이트(네이버)로 이동하기</a>

    <img class="profile-image" src="./image/profile.jpg" alt="대표 이미지 사진">
    <script src="./main.js" defer></script>
</body>
</html>
